version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: smp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-session_manager}
      POSTGRES_USER: ${POSTGRES_USER:-smp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smp_net

  redis:
    image: redis:7-alpine
    container_name: smp_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smp_net

  api:
    build: ./api
    container_name: smp_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-session_manager}
      REDIS_URL: redis://redis:6379
    volumes:
      - sessions_data:/app/sessions
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smp_net

  worker:
    build: ./worker
    container_name: smp_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-session_manager}
      REDIS_URL: redis://redis:6379
    volumes:
      - sessions_data:/app/sessions
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smp_net

  bot:
    build: ./bot
    container_name: smp_bot
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8000
    volumes:
      - logs_data:/app/logs
    depends_on:
      - api
    networks:
      - smp_net

  backup-bot:
    build: ./backup-bot
    container_name: smp_backup
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-session_manager}
    volumes:
      - backup_data:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smp_net

  web:
    build: ./web
    container_name: smp_web
    restart: unless-stopped
    networks:
      - smp_net

  nginx:
    image: nginx:alpine
    container_name: smp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - smp_net

volumes:
  postgres_data:
  redis_data:
  sessions_data:
  logs_data:
  backup_data:

networks:
  smp_net:
    driver: bridge
